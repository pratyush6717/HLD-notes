<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coding Intuition Notes</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;
  --bg2:#16161a;
  --bg3:#1e1e24;
  --bg4:#26262e;
  --border:#2e2e38;
  --text:#e8e8f0;
  --text2:#9898b0;
  --text3:#5a5a72;
  --accent:#7c6af7;
  --accent2:#a78bfa;
  --green:#4ade80;
  --red:#f87171;
  --amber:#fbbf24;
  --teal:#2dd4bf;
  --pink:#f472b6;
  --blue:#60a5fa;
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;line-height:1.6}

/* Layout */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:40px 48px;max-width:900px}

/* Sidebar */
.sidebar-title{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);padding:0 20px 12px}
.sidebar-section{margin-bottom:24px}
.sidebar-cat{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding:8px 20px 4px}
.sidebar-link{display:block;padding:7px 20px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;font-family:var(--sans)}
.sidebar-link:hover{color:var(--text);background:var(--bg3);border-left-color:var(--border)}
.sidebar-link.active{color:var(--accent2);background:rgba(124,106,247,0.08);border-left-color:var(--accent)}

/* Header */
.page-header{margin-bottom:48px}
.page-tag{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.page-title{font-size:36px;font-weight:800;line-height:1.15;color:var(--text);margin-bottom:12px}
.page-sub{font-size:15px;color:var(--text2);max-width:560px}

/* Section */
.section{margin-bottom:64px;scroll-margin-top:32px}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.section-title{font-size:20px;font-weight:700;color:var(--text)}
.section-count{font-size:11px;font-weight:600;color:var(--text3);margin-left:auto;font-family:var(--mono)}

/* Pattern card */
.pattern-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;transition:border-color 0.2s}
.pattern-card:hover{border-color:var(--bg4)}
.card-header{padding:16px 20px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;user-select:none}
.card-header:hover .card-expand{opacity:1}
.card-smell{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.card-signal{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.card-action{font-size:13px;color:var(--text2);line-height:1.5}
.card-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:4px;font-family:var(--mono)}
.tag-solid{background:rgba(96,165,250,0.12);color:var(--blue)}
.tag-iface{background:rgba(167,139,250,0.12);color:var(--accent2)}
.tag-compose{background:rgba(45,212,191,0.12);color:var(--teal)}
.tag-pattern{background:rgba(251,191,36,0.12);color:var(--amber)}
.tag-data{background:rgba(244,114,182,0.12);color:var(--pink)}
.tag-test{background:rgba(74,222,128,0.12);color:var(--green)}
.card-expand{font-size:11px;color:var(--text3);margin-left:auto;flex-shrink:0;opacity:0.5;transition:opacity 0.15s;padding-top:2px;font-family:var(--mono)}
.card-body{display:none;border-top:1px solid var(--border)}
.card-body.open{display:block}

/* Code tabs */
.code-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg3)}
.code-tab{font-size:11px;font-weight:600;padding:10px 16px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all 0.15s;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em}
.code-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.code-tab:hover:not(.active){color:var(--text2)}
.code-panel{display:none;padding:20px}
.code-panel.active{display:block}
.code-badge{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;display:inline-block;padding:3px 10px;border-radius:4px;margin-bottom:12px;font-family:var(--mono)}
.badge-bad{background:rgba(248,113,113,0.12);color:var(--red)}
.badge-good{background:rgba(74,222,128,0.12);color:var(--green)}
.code-note{font-size:13px;color:var(--text2);margin-top:12px;padding:10px 14px;background:var(--bg4);border-radius:6px;border-left:2px solid var(--accent);line-height:1.5}
pre{font-family:var(--mono);font-size:12px;line-height:1.7;background:var(--bg);padding:16px;border-radius:8px;overflow-x:auto;border:1px solid var(--border)}
.kw{color:var(--blue)}
.cl{color:var(--accent2)}
.fn{color:var(--amber)}
.str{color:var(--green)}
.cm{color:var(--text3)}
.bad-line{background:rgba(248,113,113,0.08);display:block;margin:0 -16px;padding:0 16px}
.good-line{background:rgba(74,222,128,0.06);display:block;margin:0 -16px;padding:0 16px}

/* Search */
.search-wrap{padding:0 20px 16px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color 0.15s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--accent)}

/* Stats bar */
.stats-bar{display:flex;gap:24px;margin-bottom:40px;padding:16px 20px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)}
.stat{text-align:center}
.stat-num{font-size:22px;font-weight:800;font-family:var(--mono)}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-top:2px}

/* Responsive */
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:24px 20px}
}
</style>
</head>
<body>
<div class="app">
<nav class="sidebar">
  <div class="sidebar-title">Coding Intuition</div>
  <div class="search-wrap">
    <input class="search-input" placeholder="Search patterns..." oninput="searchCards(this.value)" id="search"/>
  </div>
  <div id="sidebar-links"></div>
</nav>
<main class="main" id="main">
  <div class="page-header">
    <div class="page-tag">Reference Guide</div>
    <h1 class="page-title">Coding Intuition<br/>Cheatsheet</h1>
    <p class="page-sub">Spot the smell. Know the fix. Write better code every time.</p>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" style="color:var(--blue)">5</div><div class="stat-label">SOLID</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--accent2)">4</div><div class="stat-label">Interfaces</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--teal)">4</div><div class="stat-label">Composition</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--amber)">6</div><div class="stat-label">Patterns</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--pink)">5</div><div class="stat-label">Data Structures</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--green)">3</div><div class="stat-label">Testing</div></div>
  </div>
  <div id="content"></div>
</main>
</div>

<script>
const sections = [
  {
    id:'solid', label:'SOLID Principles', icon:'S', iconColor:'rgba(96,165,250,0.2)', iconTextColor:'var(--blue)', tagCls:'tag-solid',
    cards:[
      {
        signal:'Class does 2+ unrelated things',
        action:'Split into separate classes. One class = one job only.',
        principle:'Single Responsibility Principle',
        tags:['solid'],
        bad:{label:'Problem',code:`<span class="cm">// One class doing 2 jobs — user data AND email</span>
<span class="kw">class</span> <span class="cl">User</span> {
<span class="bad-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">saveToDatabase</span>() { ... }</span>
<span class="bad-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">sendWelcomeEmail</span>() { ... }</span>
  <span class="cm">// ^^ unrelated! DB logic + email logic in same class</span>
}`,note:'If you change email template, you touch User class. That\'s wrong — they\'re unrelated concerns.'},
        good:{label:'Fixed',code:`<span class="cm">// Each class has one job</span>
<span class="kw">class</span> <span class="cl">User</span> {
<span class="good-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">saveToDatabase</span>() { ... }</span>
}

<span class="kw">class</span> <span class="cl">EmailService</span> {
<span class="good-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">sendWelcomeEmail</span>(<span class="cl">User</span> user) { ... }</span>
}

<span class="cm">// Usage</span>
<span class="cl">User</span> u = <span class="kw">new</span> <span class="cl">User</span>();
u.<span class="fn">saveToDatabase</span>();
<span class="kw">new</span> <span class="cl">EmailService</span>().<span class="fn">sendWelcomeEmail</span>(u);`,note:'Change email logic? Touch only EmailService. Change DB logic? Touch only User. Completely isolated.'}
      },
      {
        signal:'Adding feature breaks old working code',
        action:'Add new class/method. Don\'t edit old code. Old code stays frozen.',
        principle:'Open/Closed Principle',
        tags:['solid'],
        bad:{label:'Problem',code:`<span class="kw">class</span> <span class="cl">DiscountCalculator</span> {
  <span class="kw">public</span> <span class="kw">double</span> <span class="fn">calculate</span>(<span class="cl">String</span> type, <span class="kw">double</span> price) {
<span class="bad-line">    <span class="kw">if</span> (type.equals(<span class="str">"student"</span>)) <span class="kw">return</span> price * 0.8;</span>
<span class="bad-line">    <span class="kw">if</span> (type.equals(<span class="str">"senior"</span>))  <span class="kw">return</span> price * 0.7;</span>
    <span class="cm">// Add "vip"? Must edit this class. Risky!</span>
    <span class="kw">return</span> price;
  }
}`,note:'Every new discount type means editing this class. You can accidentally break "student" while adding "vip".'},
        good:{label:'Fixed',code:`<span class="kw">interface</span> <span class="cl">Discount</span> {
  <span class="kw">double</span> <span class="fn">apply</span>(<span class="kw">double</span> price);
}

<span class="kw">class</span> <span class="cl">StudentDiscount</span> <span class="kw">implements</span> <span class="cl">Discount</span> {
  <span class="kw">public</span> <span class="kw">double</span> <span class="fn">apply</span>(<span class="kw">double</span> price) { <span class="kw">return</span> price * 0.8; }
}
<span class="kw">class</span> <span class="cl">SeniorDiscount</span> <span class="kw">implements</span> <span class="cl">Discount</span> {
  <span class="kw">public</span> <span class="kw">double</span> <span class="fn">apply</span>(<span class="kw">double</span> price) { <span class="kw">return</span> price * 0.7; }
}
<span class="cm">// Add VIP? Just add new class — don't touch old ones!</span>
<span class="kw">class</span> <span class="cl">VipDiscount</span> <span class="kw">implements</span> <span class="cl">Discount</span> {
<span class="good-line">  <span class="kw">public</span> <span class="kw">double</span> <span class="fn">apply</span>(<span class="kw">double</span> price) { <span class="kw">return</span> price * 0.5; }</span>
}

<span class="kw">class</span> <span class="cl">DiscountCalculator</span> {
  <span class="kw">public</span> <span class="kw">double</span> <span class="fn">calculate</span>(<span class="cl">Discount</span> d, <span class="kw">double</span> price) {
    <span class="kw">return</span> d.<span class="fn">apply</span>(price); <span class="cm">// open for extension</span>
  }
}`,note:'Old classes are never touched. New feature = new class only. Zero risk of breaking existing logic.'}
      },
      {
        signal:'Child class throws "not supported" error or overrides to do nothing',
        action:'Child should fully replace parent. If not — wrong inheritance. Use composition.',
        principle:'Liskov Substitution Principle',
        tags:['solid'],
        bad:{label:'Problem',code:`<span class="kw">class</span> <span class="cl">Bird</span> {
  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">fly</span>() { System.out.println(<span class="str">"flying"</span>); }
}

<span class="kw">class</span> <span class="cl">Penguin</span> <span class="kw">extends</span> <span class="cl">Bird</span> {
<span class="bad-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">fly</span>() {</span>
<span class="bad-line">    <span class="kw">throw new</span> <span class="cl">UnsupportedOperationException</span>(<span class="str">"Can't fly!"</span>);</span>
<span class="bad-line">  }</span>
  <span class="cm">// Penguin IS-A Bird but cannot fly. LSP violated!</span>
}`,note:'Code using Bird.fly() will crash when given a Penguin. You can\'t freely swap Penguin for Bird.'},
        good:{label:'Fixed',code:`<span class="kw">interface</span> <span class="cl">Bird</span> { <span class="kw">void</span> <span class="fn">eat</span>(); }

<span class="kw">interface</span> <span class="cl">FlyingBird</span> <span class="kw">extends</span> <span class="cl">Bird</span> {
<span class="good-line">  <span class="kw">void</span> <span class="fn">fly</span>();</span>
}

<span class="kw">class</span> <span class="cl">Sparrow</span> <span class="kw">implements</span> <span class="cl">FlyingBird</span> {
  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">eat</span>() { ... }
  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">fly</span>() { System.out.println(<span class="str">"Sparrow flying"</span>); }
}

<span class="kw">class</span> <span class="cl">Penguin</span> <span class="kw">implements</span> <span class="cl">Bird</span> {
<span class="good-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">eat</span>() { System.out.println(<span class="str">"Penguin eating"</span>); }</span>
  <span class="cm">// No fly() — and that's correct!</span>
}`,note:'Penguin is still a Bird, just not a FlyingBird. Each interface describes only what the class can actually do.'}
      },
      {
        signal:'Interface has methods I don\'t need — forced to implement empty/dummy methods',
        action:'Split fat interface into small focused ones. Each class picks only what it needs.',
        principle:'Interface Segregation Principle',
        tags:['solid','iface'],
        bad:{label:'Problem',code:`<span class="kw">interface</span> <span class="cl">Worker</span> {
  <span class="kw">void</span> <span class="fn">work</span>();
<span class="bad-line">  <span class="kw">void</span> <span class="fn">eat</span>();   <span class="cm">// Robot doesn't eat!</span></span>
<span class="bad-line">  <span class="kw">void</span> <span class="fn">sleep</span>(); <span class="cm">// Robot doesn't sleep!</span></span>
}

<span class="kw">class</span> <span class="cl">Robot</span> <span class="kw">implements</span> <span class="cl">Worker</span> {
  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">work</span>() { System.out.println(<span class="str">"working"</span>); }
<span class="bad-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">eat</span>() {}   <span class="cm">// forced empty method</span></span>
<span class="bad-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">sleep</span>() {} <span class="cm">// forced empty method</span></span>
}`,note:'Robot is forced to implement methods it doesn\'t use. Fat interfaces create unnecessary couplings.'},
        good:{label:'Fixed',code:`<span class="kw">interface</span> <span class="cl">Workable</span>  { <span class="kw">void</span> <span class="fn">work</span>(); }
<span class="kw">interface</span> <span class="cl">Eatable</span>   { <span class="kw">void</span> <span class="fn">eat</span>(); }
<span class="kw">interface</span> <span class="cl">Sleepable</span> { <span class="kw">void</span> <span class="fn">sleep</span>(); }

<span class="cm">// Robot only implements what it needs</span>
<span class="kw">class</span> <span class="cl">Robot</span> <span class="kw">implements</span> <span class="cl">Workable</span> {
<span class="good-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">work</span>() { System.out.println(<span class="str">"working"</span>); }</span>
}

<span class="cm">// Human implements all three</span>
<span class="kw">class</span> <span class="cl">Human</span> <span class="kw">implements</span> <span class="cl">Workable</span>, <span class="cl">Eatable</span>, <span class="cl">Sleepable</span> {
<span class="good-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">work</span>()  { ... }</span>
<span class="good-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">eat</span>()   { ... }</span>
<span class="good-line">  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">sleep</span>() { ... }</span>
}`,note:'Small interfaces. Each class picks exactly what it needs. No empty implementations. Clean and honest.'}
      },
      {
        signal:'High-level class imports low-level class directly',
        action:'Create interface between them. Both depend on interface, not each other.',
        principle:'Dependency Inversion Principle',
        tags:['solid','iface'],
        bad:{label:'Problem',code:`<span class="kw">class</span> <span class="cl">MySQLDatabase</span> {
  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">save</span>(<span class="cl">String</span> data) { ... }
}

<span class="kw">class</span> <span class="cl">OrderService</span> {
<span class="bad-line">  <span class="kw">private</span> <span class="cl">MySQLDatabase</span> db = <span class="kw">new</span> <span class="cl">MySQLDatabase</span>();</span>
  <span class="cm">// ^^ hardcoded! Can't swap to MongoDB etc.</span>
  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">placeOrder</span>(<span class="cl">String</span> order) { db.<span class="fn">save</span>(order); }
}`,note:'OrderService is glued to MySQL. Want MongoDB? Must rewrite OrderService. Both classes change together.'},
        good:{label:'Fixed',code:`<span class="kw">interface</span> <span class="cl">Database</span> { <span class="kw">void</span> <span class="fn">save</span>(<span class="cl">String</span> data); }

<span class="kw">class</span> <span class="cl">MySQLDatabase</span> <span class="kw">implements</span> <span class="cl">Database</span> {
  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">save</span>(<span class="cl">String</span> data) { ... }
}
<span class="kw">class</span> <span class="cl">MongoDatabase</span> <span class="kw">implements</span> <span class="cl">Database</span> {
  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">save</span>(<span class="cl">String</span> data) { ... }
}

<span class="kw">class</span> <span class="cl">OrderService</span> {
<span class="good-line">  <span class="kw">private</span> <span class="cl">Database</span> db; <span class="cm">// knows only the interface</span></span>
<span class="good-line">  <span class="kw">public</span> <span class="cl">OrderService</span>(<span class="cl">Database</span> db) { <span class="kw">this</span>.db = db; }</span>
  <span class="kw">public</span> <span class="kw">void</span> <span class="fn">placeOrder</span>(<span class="cl">String</span> o) { db.<span class="fn">save</span>(o); }
}

<span class="cm">// Swap DB without touching OrderService!</span>
<span class="kw">new</span> <span class="cl">OrderService</span>(<span class="kw">new</span> <span class="cl">MySQLDatabase</span>()).<span class="fn">placeOrder</span>(<span class="str">"Laptop"</span>);
<span class="kw">new</span> <span class="cl">OrderService</span>(<span class="kw">new</span> <span class="cl">MongoDatabase</span>()).<span class="fn">placeOrder</span>(<span class="str">"Phone"</span>);`,note:'Constructor Injection — the most common DIP pattern. OrderService never changes when DB changes.'}
      }
    ]
  },
  {
    id:'interfaces', label:'Interface Design', icon:'I', iconColor:'rgba(167,139,250,0.2)', iconTextColor:'var(--accent2)', tagCls:'tag-iface',
    cards:[
      {
        signal:'Want to swap implementations later',
        action:'Define interface now. Code against interface, not concrete class.',
        principle:'Program to interface',
        tags:['iface','solid'],
        bad:{label:'Problem',code:`<span class="cm">// Coding directly against concrete class</span>
<span class="bad-line"><span class="cl">ArrayList</span>&lt;<span class="cl">String</span>&gt; names = <span class="kw">new</span> <span class="cl">ArrayList</span>&lt;&gt;();</span>
names.<span class="fn">add</span>(<span class="str">"Ravi"</span>);
<span class="cm">// Now you're stuck with ArrayList everywhere</span>`,note:'If you later need LinkedList for performance, you must change every variable declaration in the codebase.'},
        good:{label:'Fixed',code:`<span class="cm">// Code against the interface List</span>
<span class="good-line"><span class="cl">List</span>&lt;<span class="cl">String</span>&gt; names = <span class="kw">new</span> <span class="cl">ArrayList</span>&lt;&gt;();</span>
names.<span class="fn">add</span>(<span class="str">"Ravi"</span>);

<span class="cm">// Swap to LinkedList in ONE place only</span>
<span class="good-line"><span class="cl">List</span>&lt;<span class="cl">String</span>&gt; names = <span class="kw">new</span> <span class="cl">LinkedList</span>&lt;&gt;();</span>`,note:'Variable type is List (interface). Only the constructor changes. All other code stays identical.'}
      },
      {
        signal:'2+ classes have same method signature but different logic',
        action:'Extract common contract into interface. Callers use interface type.',
        principle:'Common interface extraction',

function buildSidebar() {
  const container = document.getElementById('sidebar-links');
  sections.forEach(sec => {
    const catDiv = document.createElement('div');
    catDiv.className = 'sidebar-section';
    catDiv.innerHTML = `<div class="sidebar-cat">${sec.label}</div>`;
    sec.cards.forEach((card, i) => {
      const link = document.createElement('div');
      link.className = 'sidebar-link';
      link.textContent = card.signal.length > 36 ? card.signal.slice(0,36)+'…' : card.signal;
      link.onclick = () => {
        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        document.getElementById(`card-${sec.id}-${i}`).scrollIntoView({behavior:'smooth', block:'start'});
      };
      catDiv.appendChild(link);
    });
    container.appendChild(catDiv);
  });
}

function buildContent() {
  const container = document.getElementById('content');
  sections.forEach(sec => {
    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.id = sec.id;
    secEl.innerHTML = `
      <div class="section-header">
        <div class="section-icon" style="background:${sec.iconColor};color:${sec.iconTextColor}">${sec.icon}</div>
        <div class="section-title">${sec.label}</div>
        <div class="section-count">${sec.cards.length} patterns</div>
      </div>`;
    sec.cards.forEach((card, i) => {
      const tagHtml = card.tags.map(t => {
        const map = {solid:'tag-solid',iface:'tag-iface',compose:'tag-compose',pattern:'tag-pattern',data:'tag-data',test:'tag-test'};
        const labels = {solid:'SOLID',iface:'Interface',compose:'Composition',pattern:'Pattern',data:'Data structure',test:'Testing'};
        return `<span class="tag ${map[t]}">${labels[t]}</span>`;
      }).join('');
      const cardEl = document.createElement('div');
      cardEl.className = 'pattern-card';
      cardEl.id = `card-${sec.id}-${i}`;
      cardEl.innerHTML = `
        <div class="card-header" onclick="toggleCard(this)">
          <div style="flex:1">
            <div class="card-smell" style="color:${sec.iconTextColor}">Smell / Signal</div>
            <div class="card-signal">${card.signal}</div>
            <div class="card-action">${card.action}</div>
            <div style="margin-top:6px;font-size:11px;color:var(--text3);font-family:var(--mono)">${card.principle}</div>
            <div class="card-tags">${tagHtml}</div>
          </div>
          <div class="card-expand">▼ code</div>
        </div>
        <div class="card-body">
          <div class="code-tabs">
            <div class="code-tab active" onclick="switchTab(this,'bad-${sec.id}-${i}','${sec.id}-${i}')">Problem</div>
            <div class="code-tab" onclick="switchTab(this,'good-${sec.id}-${i}','${sec.id}-${i}')">Fixed</div>
          </div>
          <div class="code-panel active" id="bad-${sec.id}-${i}">
            <span class="code-badge badge-bad">${card.bad.label}</span>
            <pre>${card.bad.code}</pre>
            <div class="code-note">${card.bad.note}</div>
          </div>
          <div class="code-panel" id="good-${sec.id}-${i}">
            <span class="code-badge badge-good">${card.good.label}</span>
            <pre>${card.good.code}</pre>
            <div class="code-note">${card.good.note}</div>
          </div>
        </div>`;
      secEl.appendChild(cardEl);
    });
    container.appendChild(secEl);
  });
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const expand = header.querySelector('.card-expand');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  expand.textContent = isOpen ? '▼ code' : '▲ hide';
}

function switchTab(tab, panelId, groupId) {
  const card = tab.closest('.pattern-card');
  card.querySelectorAll('.code-tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.code-panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}

function searchCards(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.pattern-card').forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = (!q || text.includes(q)) ? 'block' : 'none';
  });
  document.querySelectorAll('.section').forEach(sec => {
    const visible = [...sec.querySelectorAll('.pattern-card')].some(c => c.style.display !== 'none');
    sec.style.display = visible ? 'block' : 'none';
  });
}

buildSidebar();
buildContent();
</script>
</body>
